uri: https://github.com/open-jarvis/OpenJarvis
branch: main
locald: repos/jarvis
lock: locks/jarvis.lock
setup:
  - arch -arm64 brew install ollama
install:
  - uv sync
  - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 uv run maturin develop -m rust/crates/openjarvis-python/Cargo.toml
  - uv run jarvis --version
  - |
    cat <<EOS > /usr/local/bin/jarvis-run
    #!/bin/bash
    set -e
    cd "${IVG_WORKD}/${IVG_LOCALD}"
    uv run "\$@"
    EOS
  - chmod +x /usr/local/bin/jarvis-run
  - jarvis-run jarvis --version
  - |
    cat <<EOS > /usr/local/bin/jarvis
    #!/bin/bash
    set -e
    /usr/local/bin/jarvis-run jarvis "\$@"
    EOS
  - chmod +x /usr/local/bin/jarvis
uninstall:
  - rm -f /usr/local/bin/jarvis-run /usr/local/bin/jarvis
